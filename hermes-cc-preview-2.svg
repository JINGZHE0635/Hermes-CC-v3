<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#0f1520"/>
    </linearGradient>
    <linearGradient id="headerGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64b5f6"/>
      <stop offset="100%" style="stop-color:#b388ff"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e676"/>
      <stop offset="100%" style="stop-color:#00c853"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg2)"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="42" fill="rgba(10,14,23,0.85)" opacity="0.9"/>
  <line x1="0" y1="42" x2="800" y2="42" stroke="rgba(100,140,255,0.08)" stroke-width="1"/>
  <text x="20" y="28" font-family="Inter,sans-serif" font-weight="700" font-size="14" fill="url(#headerGrad2)">HERMES CC</text>
  <text x="120" y="28" font-family="Inter,sans-serif" font-size="10" fill="#5a6380">Amber 主题</text>

  <!-- Right side header buttons -->
  <rect x="720" y="10" width="60" height="22" rx="4" fill="rgba(100,181,246,0.15)" stroke="rgba(100,181,246,0.2)" stroke-width="1"/>
  <text x="738" y="25" font-family="Inter,sans-serif" font-size="9" fill="#64b5f6" text-anchor="middle">运行中</text>

  <!-- Tab bar with icons -->
  <rect x="0" y="42" width="800" height="34" fill="rgba(10,14,23,0.6)"/>
  <line x1="0" y1="76" x2="800" y2="76" stroke="rgba(100,140,255,0.08)" stroke-width="1"/>

  <!-- Scrollable tabs showing actual app tabs -->
  <clipPath id="tabClip"><rect x="0" y="42" width="800" height="34"/></clipPath>
  <g clip-path="url(#tabClip)">
    <rect x="0" y="42" width="800" height="34" fill="rgba(10,14,23,0.6)"/>
    <!-- Tab items -->
    <rect x="10" y="56" height="20" width="48" rx="3" fill="none"/>
    <text x="22" y="68" font-family="Inter,sans-serif" font-size="11" fill="#8892b0">总览</text>
    <rect x="68" y="56" height="20" width="48" rx="3" fill="rgba(100,181,246,0.1)"/>
    <text x="80" y="68" font-family="Inter,sans-serif" font-size="11" fill="#64b5f6" font-weight="600">服务</text>
    <rect x="118" y="56" height="20" width="48" rx="3" fill="none"/>
    <text x="130" y="68" font-family="Inter,sans-serif" font-size="11" fill="#8892b0">成本</text>
    <rect x="168" y="56" height="20" width="48" rx="3" fill="none"/>
    <text x="180" y="68" font-family="Inter,sans-serif" font-size="11" fill="#8892b0">日志</text>
    <rect x="218" y="56" height="20" width="48" rx="3" fill="none"/>
    <text x="230" y="68" font-family="Inter,sans-serif" font-size="11" fill="#8892b0">Cron</text>
    <rect x="268" y="56" height="20" width="48" rx="3" fill="none"/>
    <text x="280" y="68" font-family="Inter,sans-serif" font-size="11" fill="#8892b0">会话</text>
    <rect x="318" y="56" height="20" width="60" rx="3" fill="none"/>
    <text x="330" y="68" font-family="Inter,sans-serif" font-size="11" fill="#8892b0">操作台</text>
    <rect x="380" y="56" height="20" width="48" rx="3" fill="none"/>
    <text x="392" y="68" font-family="Inter,sans-serif" font-size="11" fill="#8892b0">告警</text>
    <rect x="430" y="56" height="20" width="48" rx="3" fill="none"/>
    <text x="442" y="68" font-family="Inter,sans-serif" font-size="11" fill="#8892b0">趋势</text>
    <rect x="480" y="56" height="20" width="48" rx="3" fill="none"/>
    <text x="492" y="68" font-family="Inter,sans-serif" font-size="11" fill="#8892b0">分身</text>
    <rect x="530" y="56" height="20" width="48" rx="3" fill="none"/>
    <text x="542" y="68" font-family="Inter,sans-serif" font-size="11" fill="#8892b0">技能</text>
  </g>

  <!-- Service Cards -->
  <text x="20" y="100" font-family="Inter,sans-serif" font-size="11" fill="#e8edf5" font-weight="600">服务检查</text>

  <!-- Hermes Gateway Card -->
  <rect x="20" y="112" width="245" height="80" rx="8" fill="rgba(18,25,45,0.75)" stroke="rgba(100,140,255,0.08)" stroke-width="1"/>
  <rect x="20" y="112" width="4" height="80" rx="2" fill="#00e676"/>
  <text x="34" y="134" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#e8edf5">🤖 Hermes Gateway</text>
  <rect x="190" y="122" width="60" height="18" rx="8" fill="rgba(0,230,118,0.1)"/>
  <text x="204" y="135" font-family="Inter,sans-serif" font-size="9" fill="#00e676" text-anchor="middle">运行中</text>
  <text x="34" y="155" font-family="JetBrains Mono,monospace" font-size="9" fill="#5a6380">PID 1395129 · 端口 9119</text>
  <text x="34" y="170" font-family="JetBrains Mono,monospace" font-size="9" fill="#5a6380">运行 23h · 内存 142MB</text>
  <rect x="34" y="180" width="100" height="4" rx="2" fill="rgba(0,230,118,0.15)"/>
  <rect x="34" y="180" width="72" height="4" rx="2" fill="#00e676"/>

  <!-- Xray Proxy Card -->
  <rect x="278" y="112" width="245" height="80" rx="8" fill="rgba(18,25,45,0.75)" stroke="rgba(100,140,255,0.08)" stroke-width="1"/>
  <rect x="278" y="112" width="4" height="80" rx="2" fill="#ffd54f"/>
  <text x="292" y="134" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#e8edf5">🔌 Xray Proxy</text>
  <rect x="448" y="122" width="60" height="18" rx="8" fill="rgba(255,213,79,0.1)"/>
  <text x="462" y="135" font-family="Inter,sans-serif" font-size="9" fill="#ffd54f" text-anchor="middle">⚠ 异常</text>
  <text x="292" y="155" font-family="JetBrains Mono,monospace" font-size="9" fill="#5a6380">端口 10808/10809/10810</text>
  <text x="292" y="170" font-family="JetBrains Mono,monospace" font-size="9" fill="#ff5252">● 连接超时</text>

  <!-- OpenClaw Card -->
  <rect x="536" y="112" width="244" height="80" rx="8" fill="rgba(18,25,45,0.75)" stroke="rgba(100,140,255,0.08)" stroke-width="1"/>
  <rect x="536" y="112" width="4" height="80" rx="2" fill="#64b5f6"/>
  <text x="550" y="134" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#e8edf5">🦞 OpenClaw</text>
  <rect x="706" y="122" width="60" height="18" rx="8" fill="rgba(100,181,246,0.1)"/>
  <text x="720" y="135" font-family="Inter,sans-serif" font-size="9" fill="#64b5f6" text-anchor="middle">备用</text>
  <text x="550" y="155" font-family="JetBrains Mono,monospace" font-size="9" fill="#5a6380">端口 7000 · Telegram/QQ</text>
  <text x="550" y="170" font-family="JetBrains Mono,monospace" font-size="9" fill="#5a6380">上次活动: 5min ago</text>

  <!-- Operation Panel Section -->
  <text x="20" y="218" font-family="Inter,sans-serif" font-size="11" fill="#e8edf5" font-weight="600">快捷操作</text>

  <!-- Quick action buttons -->
  <rect x="20" y="228" width="180" height="36" rx="6" fill="rgba(100,181,246,0.08)" stroke="rgba(100,181,246,0.12)" stroke-width="1"/>
  <text x="110" y="250" font-family="Inter,sans-serif" font-size="11" fill="#64b5f6" text-anchor="middle">🔄 重启 Hermes</text>

  <rect x="212" y="228" width="180" height="36" rx="6" fill="rgba(255,213,79,0.08)" stroke="rgba(255,213,79,0.12)" stroke-width="1"/>
  <text x="302" y="250" font-family="Inter,sans-serif" font-size="11" fill="#ffd54f" text-anchor="middle">🔁 切换模型</text>

  <rect x="404" y="228" width="180" height="36" rx="6" fill="rgba(0,230,118,0.08)" stroke="rgba(0,230,118,0.12)" stroke-width="1"/>
  <text x="494" y="250" font-family="Inter,sans-serif" font-size="11" fill="#00e676" text-anchor="middle">🗑️ 清理缓存</text>

  <!-- Machine Info Section -->
  <text x="20" y="290" font-family="Inter,sans-serif" font-size="11" fill="#e8edf5" font-weight="600">系统信息</text>

  <rect x="20" y="300" width="760" height="80" rx="8" fill="rgba(18,25,45,0.75)" stroke="rgba(100,140,255,0.08)" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="30" y="322" font-family="Inter,sans-serif" font-size="10" fill="#8892b0">主机名</text>
  <text x="110" y="322" font-family="JetBrains Mono,monospace" font-size="10" fill="#e8edf5">VM-0-15-ubuntu</text>
  <text x="280" y="322" font-family="Inter,sans-serif" font-size="10" fill="#8892b0">系统</text>
  <text x="340" y="322" font-family="JetBrains Mono,monospace" font-size="10" fill="#e8edf5">Ubuntu 24.04 LTS</text>
  <text x="510" y="322" font-family="Inter,sans-serif" font-size="10" fill="#8892b0">内核</text>
  <text x="570" y="322" font-family="JetBrains Mono,monospace" font-size="10" fill="#e8edf5">6.8.0-45-generic</text>

  <!-- Row 2 -->
  <text x="30" y="344" font-family="Inter,sans-serif" font-size="10" fill="#8892b0">CPU</text>
  <text x="110" y="344" font-family="JetBrains Mono,monospace" font-size="10" fill="#e8edf5">8 vCPU @ 2.6 GHz</text>
  <text x="280" y="344" font-family="Inter,sans-serif" font-size="10" fill="#8892b0">内存</text>
  <text x="340" y="344" font-family="JetBrains Mono,monospace" font-size="10" fill="#e8edf5">31.4 GB (46% used)</text>
  <text x="510" y="344" font-family="Inter,sans-serif" font-size="10" fill="#8892b0">磁盘</text>
  <text x="570" y="344" font-family="JetBrains Mono,monospace" font-size="10" fill="#e8edf5">102 GB (38% used)</text>

  <!-- Row 3 -->
  <text x="30" y="366" font-family="Inter,sans-serif" font-size="10" fill="#8892b0">运行时间</text>
  <text x="110" y="366" font-family="JetBrains Mono,monospace" font-size="10" fill="#e8edf5">12 天 8 小时</text>
  <text x="280" y="366" font-family="Inter,sans-serif" font-size="10" fill="#8892b0">网络</text>
  <text x="340" y="366" font-family="JetBrains Mono,monospace" font-size="10" fill="#e8edf5">↓ 1.2 MB/s  ↑ 340 KB/s</text>

  <!-- Footer -->
  <text x="400" y="435" font-family="Inter,sans-serif" font-size="9" fill="#5a6380" text-anchor="middle">Hermes CC v3 · 综合监控操作台 · Amber 主题</text>
</svg>
